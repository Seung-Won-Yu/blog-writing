name: Collect daily news

on:
  schedule:
    # 06:17 KST. Recent scheduled runs started about 51-57 minutes late,
    # so this leaves a reliable buffer before the 08:00 Codex editor.
    - cron: '17 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-news-collection
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync public Tistory post catalog
        run: python3 -m blog_pipeline.collection.sync_tistory_posts

      - name: Collect and rank news candidates
        run: python3 -m blog_pipeline.collection.collect_news --today

      - name: Verify collection pipeline
        run: python3 -m unittest tests.test_collect_news tests.test_news_pipeline tests.test_review_inbox tests.test_sync_tistory_posts

      - name: Commit today's inbox
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config/tistory_public_posts.json docs/inbox
          if git diff --cached --quiet; then
            echo "No inbox changes"
            exit 0
          fi
          git commit -m "chore: collect daily news candidates"
          git pull --rebase origin main
          git push origin HEAD:main
