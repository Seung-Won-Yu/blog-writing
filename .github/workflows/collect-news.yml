name: Collect daily news

on:
  schedule:
    # 07:17 KST. Avoid common :00/:30 congestion and leave a buffer before 09:00.
    - cron: '17 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-news-collection
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Collect and rank news candidates
        run: python3 -m blog_pipeline.collection.collect_news --today

      - name: Verify collection pipeline
        run: python3 -m unittest tests.test_collect_news tests.test_news_pipeline tests.test_review_inbox

      - name: Commit today's inbox
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/inbox
          if git diff --cached --quiet; then
            echo "No inbox changes"
            exit 0
          fi
          git commit -m "chore: collect daily news candidates"
          git pull --rebase origin main
          git push origin HEAD:main
