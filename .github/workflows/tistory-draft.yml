name: Tistory draft HTML

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/tistory-draft.yml'
      - 'pages_to_tistory.py'
      - 'build_copy_page.py'
      - 'docs/**'
  schedule:
    - cron: '28 22 * * *'  # 22:28 UTC = 07:28 KST. 원본 07:23 KST schedule 5분 뒤
    - cron: '8 23 * * *'   # 23:08 UTC = 08:08 KST. GitHub schedule 지연/원본 반영 확인
    - cron: '48 23 * * *'  # 23:48 UTC = 08:48 KST. 최근 원본 실제 완료 시간대 이후
    - cron: '28 0 * * *'   # 00:28 UTC = 09:28 KST. 보강 실행
    - cron: '38 1 * * *'   # 01:38 UTC = 10:38 KST. 최종 보강 실행
  workflow_dispatch: {}     # 수동 실행

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: tistory-draft
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Export today's Tistory HTML from Pages
        env:
          TZ: Asia/Seoul
        run: |
          for i in 1 2 3; do
            if python pages_to_tistory.py --today; then
              python build_copy_page.py
              exit 0
            fi
            echo "Pages export failed. retry=$i"
            sleep 60
          done
          python pages_to_tistory.py --today
          python build_copy_page.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "Tistory draft: add $(TZ=Asia/Seoul date +%F) HTML"
            git push
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Wait before Pages deploy retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 45

      - id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
