name: Daily news draft

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/tistory-draft.yml'
      - 'collect_news.py'
      - 'news_pipeline.py'
      - 'generate_daily_draft.py'
      - 'article_context.py'
      - 'quiz_bank.py'
      - 'generate_editorial_images.py'
      - 'visual_direction.py'
      - 'export_tistory.py'
      - 'requirements-images.txt'
      - 'config/news_sources.json'
      - 'build_copy_page.py'
      - 'tests/**'
      - 'docs/**'
      - 'data/**'
  schedule:
    - cron: '28 22 * * *'  # 22:28 UTC = 07:28 KST
  workflow_dispatch:
    inputs:
      day:
        description: '생성할 날짜 (YYYY-MM-DD, 날짜를 비우면 오늘)'
        required: false
        type: string
      force:
        description: '기존 초안도 강제로 다시 생성'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  models: read
  pages: write
  id-token: write

concurrency:
  group: tistory-draft
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install editorial image tools
        id: image_tools
        continue-on-error: true
        run: |
          python -m pip install --disable-pip-version-check -r requirements-images.txt
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk

      - name: Collect today's news review inbox
        env:
          REQUESTED_DAY: ${{ inputs.day }}
          TZ: Asia/Seoul
        run: |
          if [ -n "$REQUESTED_DAY" ]; then
            python collect_news.py --day "$REQUESTED_DAY"
          else
            python collect_news.py --today
          fi

      - name: Generate today's local Tistory draft
        id: daily_generation
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REQUESTED_DAY: ${{ inputs.day }}
          FORCE_REBUILD: ${{ inputs.force }}
          TZ: Asia/Seoul
        run: |
          FORCE_FLAG=""
          if [ "$FORCE_REBUILD" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          if [ -n "$REQUESTED_DAY" ]; then
            python generate_daily_draft.py --day "$REQUESTED_DAY" --fallback-on-error $FORCE_FLAG
          else
            python generate_daily_draft.py --today --fallback-on-error $FORCE_FLAG
          fi

      - name: Generate branded cover and story images
        id: editorial_images
        continue-on-error: true
        env:
          REQUESTED_DAY: ${{ inputs.day }}
          TZ: Asia/Seoul
        run: |
          if [ -n "$REQUESTED_DAY" ]; then
            python generate_editorial_images.py --day "$REQUESTED_DAY"
          else
            python generate_editorial_images.py --today
          fi

      - name: Build draft copy page
        if: always()
        run: |
          python build_copy_page.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs data
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "Daily draft: add $(TZ=Asia/Seoul date +%F)"
            git push
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Wait before Pages deploy retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 45

      - id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5

      - name: Report daily generation failure
        if: steps.daily_generation.outcome == 'failure'
        run: |
          echo "뉴스 후보함은 저장했지만 자체 티스토리 초안 생성에 실패했습니다."
          exit 1

      - name: Report image fallback
        if: always() && (steps.image_tools.outcome == 'failure' || steps.editorial_images.outcome == 'failure')
        run: echo "이미지 생성에 실패해 텍스트 초안만 유지했습니다."
