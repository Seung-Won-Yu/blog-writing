name: Daily news draft

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/tistory-draft.yml'
      - 'collect_news.py'
      - 'news_pipeline.py'
      - 'generate_daily_draft.py'
      - 'export_tistory.py'
      - 'config/news_sources.json'
      - 'build_copy_page.py'
      - 'tests/**'
      - 'docs/**'
      - 'data/**'
  schedule:
    - cron: '28 22 * * *'  # 22:28 UTC = 07:28 KST
  workflow_dispatch:
    inputs:
      day:
        description: '생성할 날짜 (YYYY-MM-DD, 날짜를 비우면 오늘)'
        required: false
        type: string

permissions:
  contents: write
  models: read
  pages: write
  id-token: write

concurrency:
  group: tistory-draft
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Collect today's news review inbox
        env:
          REQUESTED_DAY: ${{ inputs.day }}
          TZ: Asia/Seoul
        run: |
          if [ -n "$REQUESTED_DAY" ]; then
            python collect_news.py --day "$REQUESTED_DAY"
          else
            python collect_news.py --today
          fi

      - name: Generate today's local Tistory draft
        id: daily_generation
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REQUESTED_DAY: ${{ inputs.day }}
          TZ: Asia/Seoul
        run: |
          if [ -n "$REQUESTED_DAY" ]; then
            python generate_daily_draft.py --day "$REQUESTED_DAY" --fallback-on-error
          else
            python generate_daily_draft.py --today --fallback-on-error
          fi
          python build_copy_page.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs data
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "Daily draft: add $(TZ=Asia/Seoul date +%F)"
            git push
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Wait before Pages deploy retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 45

      - id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5

      - name: Report daily generation failure
        if: steps.daily_generation.outcome == 'failure'
        run: |
          echo "뉴스 후보함은 저장했지만 자체 티스토리 초안 생성에 실패했습니다."
          exit 1
