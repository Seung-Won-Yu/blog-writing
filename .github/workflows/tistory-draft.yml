name: Tistory draft HTML

on:
  schedule:
    - cron: '23 1 * * *'  # 01:23 UTC = 10:23 KST (매일 1차 시도)
    - cron: '37 1 * * *'  # 01:37 UTC = 10:37 KST (예약 지연 대비 재시도)
    - cron: '53 1 * * *'  # 01:53 UTC = 10:53 KST (원본 Pages 반영 지연 대비)
    - cron: '13 2 * * *'  # 02:13 UTC = 11:13 KST (추가 재시도)
    - cron: '33 2 * * *'  # 02:33 UTC = 11:33 KST (최종 백업 시도)
  workflow_dispatch: {}     # 수동 실행

permissions:
  contents: write

concurrency:
  group: tistory-draft
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Export today's Tistory HTML from Pages
        env:
          TZ: Asia/Seoul
        run: |
          for i in 1 2 3; do
            if python pages_to_tistory.py --today; then
              python build_copy_page.py
              exit 0
            fi
            echo "Pages export failed. retry=$i"
            sleep 60
          done
          python pages_to_tistory.py --today
          python build_copy_page.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "Tistory draft: add $(TZ=Asia/Seoul date +%F) HTML"
            git push
          fi
