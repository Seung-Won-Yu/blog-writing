name: Tistory draft HTML

on:
  schedule:
    - cron: '17,32,47 1-4 * * *' # KST 10:17~13:47, 15분 간격
    - cron: '5 5 * * *'           # KST 14:05 최종 백업 시도
  workflow_dispatch: {}     # 수동 실행

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: tistory-draft
  cancel-in-progress: false

jobs:
  export:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Export today's Tistory HTML from Pages
        env:
          TZ: Asia/Seoul
        run: |
          for i in 1 2 3; do
            if python pages_to_tistory.py --today; then
              python build_copy_page.py
              exit 0
            fi
            echo "Pages export failed. retry=$i"
            sleep 60
          done
          python pages_to_tistory.py --today
          python build_copy_page.py

      - name: Commit & push
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Tistory draft: add $(TZ=Asia/Seoul date +%F) HTML"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check published draft
        id: published
        env:
          TZ: Asia/Seoul
        run: |
          today="$(date +%F)"
          url="https://seung-won-yu.github.io/blog-writing/tistory/${today}.html?check=$(date +%s)"
          if curl --fail --location --silent --output /dev/null "$url"; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/configure-pages@v5
        if: steps.commit.outputs.changed == 'true' || steps.published.outputs.published != 'true' || github.event_name == 'workflow_dispatch'

      - uses: actions/upload-pages-artifact@v3
        if: steps.commit.outputs.changed == 'true' || steps.published.outputs.published != 'true' || github.event_name == 'workflow_dispatch'
        with:
          path: docs

      - id: deployment
        if: steps.commit.outputs.changed == 'true' || steps.published.outputs.published != 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/deploy-pages@v5
