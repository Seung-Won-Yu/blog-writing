name: Daily digest

on:
  schedule:
    - cron: '30 0 * * *'   # 00:30 UTC = 09:30 KST (매일)
  workflow_dispatch: {}     # 수동 실행

permissions:
  contents: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install --quiet edge-tts

      - name: Run daily pipeline (Gemini)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TZ: Asia/Seoul
        run: python pipeline_gemini.py

      - name: Export Tistory-ready post
        run: python export_tistory.py --latest

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "Daily auto: add $(TZ=Asia/Seoul date +%F) issue" -m "Co-Authored-By: Claude Opus 4.8 <noreply@anthropic.com>"
            git push
          fi
