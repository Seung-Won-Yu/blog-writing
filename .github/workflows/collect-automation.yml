name: Collect Saturday automation candidates

on:
  schedule:
    # 11:17 KST Saturday. Leaves time for review before the 14:00 Codex task.
    - cron: '17 2 * * 6'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: saturday-automation-collection
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Collect and rank automation candidates
        run: python3 -m blog_pipeline.collection.collect_automation --today

      - name: Verify automation collection
        run: python3 -m unittest tests.test_collect_automation tests.test_collect_news tests.test_news_pipeline

      - name: Commit Saturday automation inbox
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/automation-inbox
          if git diff --cached --quiet; then
            echo "No automation inbox changes"
            exit 0
          fi
          git commit -m "chore: collect Saturday automation candidates"
          git push origin HEAD:main
