<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>티스토리 블로그 초안 복사</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #111827;
      --muted: #64748b;
      --line: #dbe5ee;
      --soft: #f8fafc;
      --accent: #0f9b8e;
      --accent-weak: #e8f7f4;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #f5f7fb;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      line-height: 1.6;
    }
    .wrap {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0 54px;
    }
    header {
      margin-bottom: 24px;
      padding: 26px 28px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(135deg, #ffffff 0%, #f1faf8 64%, #fff7ed 100%);
      box-shadow: 0 16px 42px rgba(15, 23, 42, 0.07);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.25;
      letter-spacing: 0;
    }
    .lead {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }
    .header-row {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
    }
    .header-copy {
      min-width: 0;
    }
    .action-btn {
      display: inline-flex;
      min-height: 42px;
      flex: 0 0 auto;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      border-radius: 12px;
      background: #111827;
      color: #ffffff;
      font-size: 14px;
      font-weight: 850;
      text-decoration: none;
      white-space: nowrap;
    }
    .action-btn:hover {
      background: #0f9b8e;
    }
    .layout {
      display: grid;
      grid-template-columns: 310px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 12px 34px rgba(15, 23, 42, 0.06);
      overflow: hidden;
    }
    .side-head, .main-head {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--soft);
      font-weight: 850;
    }
    .drafts {
      display: grid;
      gap: 8px;
      padding: 12px;
    }
    .draft-btn {
      width: 100%;
      padding: 12px 13px;
      border: 1px solid transparent;
      border-radius: 12px;
      background: #ffffff;
      color: var(--ink);
      text-align: left;
      cursor: pointer;
    }
    .draft-btn:hover, .draft-btn.is-active {
      border-color: #9ad9d0;
      background: var(--accent-weak);
    }
    .draft-btn span {
      display: block;
      font-weight: 850;
    }
    .draft-btn small {
      display: -webkit-box;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .content {
      padding: 18px;
    }
    .meta-grid {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }
    .field {
      display: grid;
      grid-template-columns: 84px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #ffffff;
    }
    .label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }
    .value {
      min-width: 0;
      overflow: hidden;
      color: #243044;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    button.copy {
      min-height: 36px;
      padding: 0 12px;
      border: 0;
      border-radius: 10px;
      background: #111827;
      color: #ffffff;
      font-weight: 850;
      cursor: pointer;
    }
    button.copy.secondary {
      background: #0f9b8e;
    }
    .code-head {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin: 18px 0 10px;
    }
    .code-head h2 {
      margin: 0;
      font-size: 18px;
    }
    textarea {
      display: block;
      width: 100%;
      min-height: 560px;
      padding: 16px;
      border: 1px solid #cfdbe7;
      border-radius: 14px;
      background: #0b1220;
      color: #dce8f8;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
      line-height: 1.62;
      resize: vertical;
      white-space: pre;
    }
    .status {
      min-height: 22px;
      margin-top: 10px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 800;
    }
    .empty {
      padding: 28px;
      color: var(--muted);
    }
    @media (max-width: 820px) {
      .layout { grid-template-columns: 1fr; }
      .header-row { align-items: stretch; flex-direction: column; }
      .action-btn { width: 100%; }
      .field { grid-template-columns: 1fr; }
      button.copy { width: 100%; }
      textarea { min-height: 430px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="header-row">
        <div class="header-copy">
          <h1>티스토리 블로그 초안 복사</h1>
          <p class="lead">조이한 데일리 뉴스룸에서 가져온 글을 티스토리 HTML 모드에 바로 붙여넣을 수 있게 보여줍니다.</p>
        </div>
        <a class="action-btn" href="https://github.com/Seung-Won-Yu/blog-writing/actions/workflows/tistory-draft.yml" target="_blank" rel="noopener" title="GitHub Actions에서 Run workflow로 오늘 초안을 생성합니다.">초안 수동 생성</a>
      </div>
    </header>

    <div class="layout">
      <aside class="panel">
        <div class="side-head">초안 목록</div>
        <div class="drafts" id="drafts"><button class="draft-btn" type="button" data-day="2026-07-02"><span>2026-07-02</span><small>[데일리 IT 뉴스] 2026. 7. 2 - 오늘의 개발 뉴스와 정처기 문제</small></button>
<button class="draft-btn" type="button" data-day="2026-07-01"><span>2026-07-01</span><small>[데일리 IT 뉴스] 2026. 7. 1 - 오늘의 개발 뉴스와 정처기 문제</small></button></div>
      </aside>

      <main class="panel">
        <div class="main-head">붙여넣기 정보</div>
        <div class="content" id="content">
          <div class="meta-grid">
            <div class="field"><span class="label">제목</span><span class="value" id="title"></span><button class="copy" type="button" data-copy="title">복사</button></div>
            <div class="field"><span class="label">카테고리</span><span class="value" id="category"></span><button class="copy" type="button" data-copy="category">복사</button></div>
            <div class="field"><span class="label">태그</span><span class="value" id="tags"></span><button class="copy" type="button" data-copy="tags">복사</button></div>
            <div class="field"><span class="label">원본</span><span class="value" id="source"></span><button class="copy" type="button" data-copy="source">복사</button></div>
          </div>

          <div class="code-head">
            <h2>본문 HTML 코드</h2>
            <button class="copy secondary" type="button" data-copy="html">본문 HTML 복사</button>
          </div>
          <textarea id="htmlCode" spellcheck="false"></textarea>
          <div class="status" id="status"></div>
        </div>
      </main>
    </div>
  </div>

  <script>
    const drafts = [{"day": "2026-07-02", "title": "[데일리 IT 뉴스] 2026. 7. 2 - 오늘의 개발 뉴스와 정처기 문제", "category": "데일리IT뉴스", "tags": "AI, IT뉴스, 개발뉴스, 정처기, 개발용어, 데일리다이제스트", "source_page": "https://ihan0316.github.io/ai-weekly-newsroom/days/2026-07-02.html", "html_path": "tistory/2026-07-02.html", "meta_path": "tistory/2026-07-02.json"}, {"day": "2026-07-01", "title": "[데일리 IT 뉴스] 2026. 7. 1 - 오늘의 개발 뉴스와 정처기 문제", "category": "데일리IT뉴스", "tags": "AI, IT뉴스, 개발뉴스, 정처기, 개발용어, 데일리다이제스트", "source_page": "https://ihan0316.github.io/ai-weekly-newsroom/days/2026-07-01.html", "html_path": "tistory/2026-07-01.html", "meta_path": "tistory/2026-07-01.json"}];
    const latest = "2026-07-02";
    let current = null;
    let currentHtml = "";
    const byDay = new Map(drafts.map((item) => [item.day, item]));

    const els = {
      title: document.getElementById("title"),
      category: document.getElementById("category"),
      tags: document.getElementById("tags"),
      source: document.getElementById("source"),
      htmlCode: document.getElementById("htmlCode"),
      status: document.getElementById("status"),
    };

    function setStatus(text) {
      els.status.textContent = text;
      if (text) setTimeout(() => { if (els.status.textContent === text) els.status.textContent = ""; }, 1800);
    }

    async function selectDraft(day) {
      const draft = byDay.get(day);
      if (!draft) return;
      current = draft;
      document.querySelectorAll(".draft-btn").forEach((button) => {
        button.classList.toggle("is-active", button.dataset.day === day);
      });
      els.title.textContent = draft.title || "";
      els.category.textContent = draft.category || "";
      els.tags.textContent = draft.tags || "";
      els.source.textContent = draft.source_page || "";
      els.htmlCode.value = "불러오는 중...";
      const response = await fetch(draft.html_path + "?v=" + Date.now());
      currentHtml = await response.text();
      els.htmlCode.value = currentHtml;
      setStatus(day + " 초안을 불러왔습니다.");
    }

    async function copyText(text, label) {
      if (!text) return;
      try {
        await navigator.clipboard.writeText(text);
      } catch (error) {
        els.htmlCode.focus();
        els.htmlCode.select();
        document.execCommand("copy");
      }
      setStatus(label + " 복사 완료");
    }

    document.getElementById("drafts").addEventListener("click", (event) => {
      const button = event.target.closest(".draft-btn");
      if (button) selectDraft(button.dataset.day);
    });

    document.addEventListener("click", (event) => {
      const button = event.target.closest("[data-copy]");
      if (!button || !current) return;
      const type = button.dataset.copy;
      if (type === "html") copyText(currentHtml, "본문 HTML");
      if (type === "title") copyText(current.title, "제목");
      if (type === "category") copyText(current.category, "카테고리");
      if (type === "tags") copyText(current.tags, "태그");
      if (type === "source") copyText(current.source_page, "원본 링크");
    });

    if (latest) selectDraft(latest);
  </script>
</body>
</html>
