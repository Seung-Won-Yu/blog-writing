  <style>
    :root {
      color-scheme: light;
      --ink: #111827;
      --muted: #64748b;
      --line: #dbe5ee;
      --soft: #f8fafc;
      --accent: #0f9b8e;
      --accent-weak: #e8f7f4;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #f5f7fb;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      line-height: 1.6;
    }
    .wrap {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0 54px;
    }
    header {
      margin-bottom: 24px;
      padding: 26px 28px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(135deg, #ffffff 0%, #f1faf8 64%, #fff7ed 100%);
      box-shadow: 0 16px 42px rgba(15, 23, 42, 0.07);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.25;
      letter-spacing: 0;
    }
    .lead {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }
    .header-row {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
    }
    .header-copy {
      min-width: 0;
    }
    .action-btn {
      display: inline-flex;
      min-height: 42px;
      flex: 0 0 auto;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      border-radius: 12px;
      background: #111827;
      color: #ffffff;
      font-size: 14px;
      font-weight: 850;
      text-decoration: none;
      white-space: nowrap;
    }
    .action-btn:hover {
      background: #0f9b8e;
    }
    .layout {
      display: grid;
      grid-template-columns: 310px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 12px 34px rgba(15, 23, 42, 0.06);
      overflow: hidden;
    }
    .side-head, .main-head {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--soft);
      font-weight: 850;
    }
    .drafts {
      display: grid;
      gap: 8px;
      padding: 12px;
    }
    .draft-btn {
      width: 100%;
      padding: 12px 13px;
      border: 1px solid transparent;
      border-radius: 12px;
      background: #ffffff;
      color: var(--ink);
      text-align: left;
      cursor: pointer;
    }
    .draft-btn:hover, .draft-btn.is-active {
      border-color: #9ad9d0;
      background: var(--accent-weak);
    }
    .draft-btn span {
      display: block;
      font-weight: 850;
    }
    .draft-btn small {
      display: -webkit-box;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .content {
      padding: 18px;
    }
    .meta-grid {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }
    .field {
      display: grid;
      grid-template-columns: 84px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #ffffff;
    }
    .label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }
    .value {
      min-width: 0;
      overflow: hidden;
      color: #243044;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .value.long {
      white-space: normal;
    }
    .assist-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin: 0 0 18px;
    }
    .assist-card {
      min-width: 0;
      padding: 15px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);

    .assist-card h2 {
      margin: 0 0 10px;
      color: #18212f;
      font-size: 15px;
      line-height: 1.35;
    }
    .assist-card ul {
      display: grid;
      gap: 8px;
      margin: 0 0 12px;
      padding-left: 18px;
      color: #334155;
      font-size: 14px;
    }
    .assist-card li {
      padding-left: 2px;
    }
    .assist-card p {
      margin: 0 0 12px;
      color: #334155;
      font-size: 14px;
    }

      padding: 0 12px;
      border: 0;
      border-radius: 10px;
      background: #111827;
      color: #ffffff;
      font-weight: 850;

      font-weight: 800;
    }

      .field { grid-template-columns: 1fr; }
      button.copy { width: 100%; }
      textarea { min-height: 430px; }
    }
  </style>
</head>

    function setStatus(text) {
      els.status.textContent = text;
      if (text) setTimeout(() => { if (els.status.textContent === text) els.status.textContent = ""; }, 1800);
    }

    function renderList(target, rows) {
      target.innerHTML = "";
      (rows || []).forEach((text) => {
        const li = document.createElement("li");
        li.textContent = text;
        target.appendChild(li);
      });
    }

    function numbered(rows) {
      return (rows || []).map((text, index) => `${index + 1}. ${text}`).join("\n");
    }

    function operatingMemo() {
      if (!current) return "";
      return [
        "[제목 후보]",
        numbered(current.title_candidates),
        "",
        "[메타 설명]",
        current.meta_description || "",
        "",
        "[핵심 요약]",
        numbered(current.key_summary),
        "",
        "[발행 체크리스트]",
        numbered(current.publish_checklist),
      ].join("\n");
    }

    async function selectDraft(day) {
      const draft = byDay.get(day);
      if (!draft) return;
      current = draft;
      document.querySelectorAll(".draft-btn").forEach((button) => {
        button.classList.toggle("is-active", button.dataset.day === day);
      });
      els.title.textContent = draft.title || "";
      els.category.textContent = draft.category || "";
      els.tags.textContent = draft.tags || "";
      els.metaDescription.textContent = draft.meta_description || "";
      els.source.textContent = draft.source_page || "";
      renderList(els.titleCandidates, draft.title_candidates);
      renderList(els.keySummary, draft.key_summary);
      renderList(els.publishChecklist, draft.publish_checklist);
      els.htmlCode.value = "불러오는 중...";
      const response = await fetch(draft.html_path + "?v=" + Date.now());
      currentHtml = await response.text();
      els.htmlCode.value = currentHtml;
      setStatus(day + " 초안을 불러왔습니다.");
    }

    async function copyText(text, label) {
      if (!text) return;
      try {
        await navigator.clipboard.writeText(text);
      } catch (error) {
        els.htmlCode.focus();
        els.htmlCode.select();
        document.execCommand("copy");
      }
      setStatus(label + " 복사 완료");
    }

    document.getElementById("drafts").addEventListener("click", (event) => {
      const button = event.target.closest(".draft-btn");
      if (button) selectDraft(button.dataset.day);
    });

    document.addEventListener("click", (event) => {
      const button = event.target.closest("[data-copy]");
      if (!button || !current) return;
      const type = button.dataset.copy;
      if (type === "html") copyText(currentHtml, "본문 HTML");
      if (type === "title") copyText(current.title, "제목");
      if (type === "titles") copyText(numbered(current.title_candidates), "제목 후보");
      if (type === "category") copyText(current.category, "카테고리");
      if (type === "tags") copyText(current.tags, "태그");
      if (type === "meta") copyText(current.meta_description, "메타 설명");
      if (type === "summary") copyText(numbered(current.key_summary), "핵심 요약");
      if (type === "checklist") copyText(numbered(current.publish_checklist), "체크리스트");
      if (type === "allMeta") copyText(operatingMemo(), "운영 정보");
      if (type === "source") copyText(current.source_page, "원본 링크");
    });

    if (latest) selectDraft(latest);
  </script>
</body>
</html>
