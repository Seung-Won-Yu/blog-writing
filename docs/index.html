<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%2328745a'/%3E%3Cpath d='M18 18h28v8H26v20h-8z' fill='white'/%3E%3C/svg%3E">
  <title>티스토리 발행 준비</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17211c;
      --muted: #66716b;
      --line: #d8dedb;
      --paper: #ffffff;
      --canvas: #f3f4f1;
      --accent: #28745a;
      --accent-soft: #edf4f0;
      --warm: #f7f4ec;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--canvas);
      color: var(--ink);
      font-family: "Pretendard Variable", "SUIT Variable", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      line-height: 1.55;
    }
    button, textarea { font: inherit; }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    button:focus-visible, textarea:focus-visible, a:focus-visible {
      outline: 3px solid #91c4b0;
      outline-offset: 2px;
    }
    .wrap {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 30px 0 52px;
    }
    .masthead {
      margin-bottom: 16px;
      padding: 22px 24px;
      border-top: 4px solid var(--accent);
      border-bottom: 1px solid var(--line);
      background: var(--paper);
    }
    .eyebrow {
      margin: 0 0 7px;
      color: var(--accent);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .14em;
    }
    h1 {
      margin: 0;
      font-size: clamp(25px, 3vw, 34px);
      line-height: 1.2;
      letter-spacing: -.035em;
    }
    .lead {
      margin: 9px 0 0;
      color: var(--muted);
      font-size: 14px;
    }
    .layout {
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }
    .panel {
      border: 1px solid var(--line);
      background: var(--paper);
    }
    .panel-title {
      padding: 13px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--warm);
      font-size: 13px;
      font-weight: 900;
    }
    .drafts {
      display: grid;
      gap: 4px;
      padding: 8px;
    }
    .draft-btn {
      width: 100%;
      padding: 10px 11px;
      border: 1px solid transparent;
      border-radius: 4px;
      background: transparent;
      color: var(--ink);
      text-align: left;
      cursor: pointer;
    }
    .draft-btn:hover, .draft-btn.is-active {
      border-color: #b9d0c5;
      background: var(--accent-soft);
    }
    .draft-btn span {
      display: block;
      font-size: 13px;
      font-weight: 900;
    }
    .draft-btn small {
      display: -webkit-box;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.4;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .content { padding: 18px; }
    .publish-fields {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }
    .field {
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      min-height: 48px;
      padding: 9px 11px;
      border-bottom: 1px solid var(--line);
    }
    .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }
    .value {
      min-width: 0;
      color: #27332d;
      font-size: 14px;
      overflow-wrap: anywhere;
    }
    .title-value {
      font-size: 16px;
      font-weight: 850;
      line-height: 1.45;
    }
    .image-card {
      display: grid;
      grid-template-columns: 170px minmax(0, 1fr);
      gap: 14px;
      align-items: center;
      margin: 0 0 16px;
      padding: 12px;
      border: 1px solid var(--line);
      background: #fbfcfb;
    }
    .cover-preview {
      display: block;
      width: 100%;
      aspect-ratio: 1200 / 630;
      object-fit: cover;
      border: 1px solid var(--line);
      background: var(--warm);
    }
    .image-info h2 {
      margin: 0 0 5px;
      font-size: 14px;
    }
    .image-info p {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 12px;
    }
    .ad-builder {
      margin: 0 0 14px;
      padding: 14px;
      border: 1px solid var(--line);
      border-left: 4px solid var(--accent);
      background: #fbfcfb;
    }
    .ad-builder-head {
      display: flex;
      gap: 12px;
      align-items: end;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .ad-builder h2 {
      margin: 0;
      font-size: 15px;
    }
    .ad-builder p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 12px;
    }
    .ad-input {
      display: block;
      width: 100%;
      min-height: 88px;
      padding: 10px 11px;
      border: 1px solid #bfcac4;
      border-radius: 3px;
      background: #ffffff;
      color: #27332d;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
      resize: vertical;
    }
    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
      margin: 12px 0 10px;
    }
    .btn, .download-link {
      display: inline-flex;
      min-height: 38px;
      align-items: center;
      justify-content: center;
      padding: 0 13px;
      border: 1px solid #9aa8a1;
      border-radius: 3px;
      background: #ffffff;
      color: var(--ink);
      font-size: 13px;
      font-weight: 850;
      text-decoration: none;
      cursor: pointer;
    }
    .btn.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #ffffff;
    }
    .btn.dark {
      border-color: #17211c;
      background: #17211c;
      color: #ffffff;
    }
    .btn:hover:not(:disabled), .download-link:hover {
      border-color: var(--accent);
      background: var(--accent);
      color: #ffffff;
    }
    .btn:disabled {
      cursor: not-allowed;
      opacity: .42;
    }
    .review-gate {
      margin: 0 auto 8px 0;
      color: #9a5c12;
      font-size: 12px;
      font-weight: 850;
    }
    .review-gate[data-ready="true"] { color: var(--accent); }
    .manual-help {
      margin: 0 0 10px;
      padding: 10px 12px;
      border-left: 3px solid #c99b43;
      background: var(--warm);
      color: #46534d;
      font-size: 12px;
    }
    .code-output {
      display: block;
      width: 100%;
      min-height: 440px;
      padding: 15px;
      border: 1px solid #263449;
      border-radius: 3px;
      background: #0b1220;
      color: #dce8f8;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.6;
      resize: vertical;
      white-space: pre;
    }
    .preview-pane {
      width: 100%;
      min-height: 700px;
      border: 1px solid var(--line);
      background: #ffffff;
      overflow: hidden;
    }
    .preview-frame {
      display: block;
      width: 100%;
      height: min(82vh, 1040px);
      min-height: 700px;
      border: 0;
      background: #ffffff;
    }
    textarea[hidden], .preview-pane[hidden] { display: none; }
    .status {
      min-height: 20px;
      margin-top: 8px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
    }
    .status[data-kind="error"] { color: #a33b2b; }
    .empty {
      padding: 22px 14px;
      color: var(--muted);
      font-size: 13px;
    }
    @media (max-width: 760px) {
      .wrap { width: min(100% - 20px, 680px); padding-top: 14px; }
      .masthead { padding: 18px; }
      .layout { grid-template-columns: 1fr; }
      .content { padding: 12px; }
      .field { grid-template-columns: 1fr auto; }
      .field .label { grid-column: 1 / -1; }
      .image-card { grid-template-columns: 1fr; }
      .ad-builder-head { align-items: stretch; flex-direction: column; }
      .action-row { display: grid; grid-template-columns: 1fr; }
      .btn, .download-link { width: 100%; }
      .code-output { min-height: 360px; }
      .preview-pane, .preview-frame { min-height: 560px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="masthead">
      <p class="eyebrow">DAILY PUBLISH DESK</p>
      <h1>오늘 글 발행 준비</h1>
      <p class="lead">매일 09:00 Codex Terra / Medium이 만든 결과에서 발행에 필요한 항목만 확인합니다.</p>
    </header>

    <div class="layout">
      <aside class="panel">
        <div class="panel-title">초안 날짜</div>
        <div class="drafts" id="drafts"><button class="draft-btn" type="button" data-day="2026-07-15" aria-pressed="false"><span>2026-07-15</span><small>250억 원 청구서부터 AI 보안 경고까지, 자동화 결과를 다시 보는 법</small></button>
<button class="draft-btn" type="button" data-day="2026-07-14" aria-pressed="false"><span>2026-07-14</span><small>딥페이크 얼굴, 1시간 훈련하면 정말 두 배 더 잘 찾을까</small></button>
<button class="draft-btn" type="button" data-day="2026-07-13" aria-pressed="false"><span>2026-07-13</span><small>러닝 대회가 비싸서 직접 앱을 만든 개발자, LLRUN에서 배운 3가지</small></button>
<button class="draft-btn" type="button" data-day="2026-07-12" aria-pressed="false"><span>2026-07-12</span><small>메타는 왜 &#x27;인스타 사진 AI 연동&#x27;을 사흘 만에 멈췄을까</small></button>
<button class="draft-btn" type="button" data-day="2026-07-11" aria-pressed="false"><span>2026-07-11</span><small>Ghostty는 왜 Zig를 택했을까? 미첼 하시모토가 말한 터미널과 오픈소스</small></button></div>
      </aside>

      <main class="panel">
        <div class="panel-title">티스토리 붙여넣기</div>
        <div class="content">
          <section class="publish-fields" aria-label="발행 정보">
            <div class="field"><span class="label">추천 제목</span><span class="value title-value" id="title"></span><button class="btn dark" type="button" data-copy="title">복사</button></div>
            <div class="field"><span class="label">카테고리</span><span class="value" id="category"></span><button class="btn" type="button" data-copy="category">복사</button></div>
            <div class="field"><span class="label">태그</span><span class="value" id="tags"></span><button class="btn" type="button" data-copy="tags">복사</button></div>
          </section>

          <section class="image-card" id="imageCard" hidden>
            <img class="cover-preview" id="coverPreview" alt="대표 이미지 미리보기" loading="lazy">
            <div class="image-info">
              <h2>대표 이미지</h2>
              <p id="coverTitle"></p>
              <a class="download-link" id="coverDownload" href="#" download>대표 이미지 다운로드</a>
            </div>
          </section>

          <section class="ad-builder">
            <div class="ad-builder-head">
              <div>
                <h2><label for="adMarkup">광고 HTML 태그</label></h2>
                <p>티스토리 광고 넣기로 만든 태그를 붙이면 NEWS 01 뒤에 정확히 한 번 들어갑니다.</p>
              </div>
              <button class="btn primary" type="button" id="buildFinalButton" disabled>최종 HTML 만들기</button>
            </div>
            <textarea class="ad-input" id="adMarkup" spellcheck="false"></textarea>
          </section>

          <div class="action-row">
            <p class="review-gate" id="reviewGateStatus" data-ready="false">초안을 선택해 주세요.</p>
            <button class="btn" type="button" id="previewButton" aria-expanded="false" aria-controls="previewPane" disabled>본문 미리보기</button>
            <button class="btn dark" type="button" id="finalCopyButton" data-copy="final" disabled>최종 HTML 복사</button>
          </div>
          <p class="manual-help"><strong>붙여넣기:</strong> 최종 HTML을 티스토리 HTML 모드에 한 번 붙여넣고 기본모드로 다시 전환하지 마세요.</p>
          <label class="sr-only" for="htmlCode">최종 블로그 본문 HTML</label>
          <textarea class="code-output" id="htmlCode" spellcheck="false" readonly></textarea>
          <section class="preview-pane" id="previewPane" aria-label="블로그 본문 미리보기" hidden>
            <iframe class="preview-frame" id="previewFrame" title="블로그 본문 미리보기" sandbox="allow-same-origin" referrerpolicy="no-referrer"></iframe>
          </section>
          <div class="status" id="status" role="status" aria-live="polite"></div>
        </div>
      </main>
    </div>
  </div>

    });

    document.addEventListener("click", (event) => {
      const button = event.target.closest("[data-copy]");
      if (!button || !current) return;
      const type = button.dataset.copy;
      if (type === "final") {
        if (!isDraftCopyReady() || !isFinalHtmlStructurallyValid(currentFinalHtml)) {
          setStatus("전체 본문 구조가 확인되지 않아 복사하지 않았습니다.", "error");
          return;
        }
        copyText(currentFinalHtml, "최종 HTML");
      }
      if (type === "title") copyText(current.title, "추천 제목");
      if (type === "category") copyText(current.category, "카테고리");
      if (type === "tags") copyText(current.tags, "태그");
    });

    if (latest) selectDraft(latest);
  </script>
</body>
</html>
